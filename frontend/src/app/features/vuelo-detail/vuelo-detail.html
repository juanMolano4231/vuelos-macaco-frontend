<app-card *ngIf="vuelo; else loading">
  <h2>Vuelo {{ vuelo.id }}</h2>
  <p><strong>Origen:</strong> {{ vuelo.origen }}</p>
  <p><strong>Destino:</strong> {{ vuelo.destino }}</p>
  <p><strong>Salida:</strong> {{ vuelo.inicio | date:'short' }}</p>
  <p><strong>Llegada:</strong> {{ vuelo.final | date:'short' }}</p>

  <button (click)="comprarTiquete()">Comprar Tiquete</button>
  <app-button to="/vuelos" label="Volver"></app-button>

</app-card>

<ng-template #loading>
  <p>Cargando vuelo...</p>
</ng-template>
