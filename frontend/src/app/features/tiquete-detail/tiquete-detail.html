<app-card *ngIf="tiquete && vuelo; else loading">
    <h2>Tiquete {{ tiquete.id }}</h2>
    <p><strong>Valor:</strong> {{ tiquete.valor }}</p>
    <h2>Vuelo {{ vuelo.id }}</h2>
    <p><strong>Origen:</strong> {{ vuelo.origen }}</p>
    <p><strong>Destino:</strong> {{ vuelo.destino }}</p>
    <p><strong>Salida:</strong> {{ vuelo.inicio | date:'short' }}</p>
    <p><strong>Llegada:</strong> {{ vuelo.final | date:'short' }}</p>
    <app-button to="/tiquetes" label="Volver"></app-button>
</app-card>

<ng-template #loading>
    <p>Cargando...</p>
</ng-template>
